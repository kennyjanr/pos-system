spring:
  application:
    name: pos-system
  
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:pos_db}
    username: ${DB_USER:pos_user}
    password: ${DB_PASSWORD:pos_password}
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    show-sql: false
  
  security:
    user:
      name: admin
      password: admin

server:
  port: ${SERVER_PORT:8080}
  servlet:
    context-path: /

# JWT Configuration (configured via environment or @Value defaults)
# The JwtService constructor already specifies defaults, so these
# properties are no longer needed here. If you wish to override values
# at runtime, set the corresponding environment variables or pass them
# as command-line properties (e.g. --JWT_SECRET=...).
#
#JWT_SECRET: ${JWT_SECRET:replace-with-secure-secret-key-at-least-32-chars}
#ACCESS_TOKEN_EXPIRY_SECONDS: ${ACCESS_TOKEN_EXPIRY_SECONDS:900}
#REFRESH_TOKEN_EXPIRY_DAYS: ${REFRESH_TOKEN_EXPIRY_DAYS:30}

# CORS Configuration
# The front-end origin can be supplied via environment variable or command-
# line property.  We avoid defining it here with a self-referential placeholder
# because Spring's resolver treats that as a circular reference (see earlier
# startup failures). To override, set FRONTEND_ORIGIN in the shell or pass
# --FRONTEND_ORIGIN=...
#FRONTEND_ORIGIN: ${FRONTEND_ORIGIN:http://localhost:5173}

